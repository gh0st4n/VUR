<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results - VUR</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <!-- Header -->
    <header class="bg-gray-800 border-b border-gray-700">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <a href="index.html" class="text-2xl font-bold text-blue-400">VUR</a>
                    <span class="text-gray-400 hidden sm:inline">/ Search</span>
                </div>
                <nav class="flex items-center space-x-6">
                    <a href="index.html" class="text-gray-300 hover:text-white transition">Home</a>
                    <a href="search.html" class="text-gray-300 hover:text-white transition">Search</a>
                    <button id="themeToggle" class="p-2 rounded-lg bg-gray-700 hover:bg-gray-600 transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                        </svg>
                    </button>
                </nav>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        <!-- Search Section -->
        <section class="mb-8">
            <div class="max-w-2xl mx-auto">
                <form id="searchForm" class="flex gap-2">
                    <input 
                        type="text" 
                        id="searchInput" 
                        placeholder="Search packages..."
                        class="flex-1 px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:border-blue-500 transition"
                    >
                    <button 
                        type="submit"
                        class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-medium"
                    >
                        Search
                    </button>
                </form>
            </div>
        </section>

        <!-- Search Results -->
        <section>
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-2xl font-bold">
                    <span id="searchQuery"></span>
                </h2>
                <span id="resultCount" class="text-gray-400"></span>
            </div>
            
            <div id="searchResults" class="space-y-4">
                <!-- Results will be loaded here -->
            </div>
            
            <!-- Loading State -->
            <div id="loadingSpinner" class="text-center py-8 hidden">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>
            </div>
            
            <!-- No Results -->
            <div id="noResults" class="hidden text-center py-12">
                <div class="text-gray-500 text-6xl mb-4">🔍</div>
                <h3 class="text-xl font-bold mb-2">No packages found</h3>
                <p class="text-gray-400">Try searching with different keywords</p>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 border-t border-gray-700 mt-12">
        <div class="container mx-auto px-4 py-6 text-center text-gray-400">
            <p>&copy; 2024 VUR - Void User Repository. Built with ❤️ for the community.</p>
        </div>
    </footer>

    <script src="js/search.js"></script>
</body>
</html>
